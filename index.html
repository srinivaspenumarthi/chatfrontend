      .background {

        top: 0;

        height: 4px;

      }

      @keyframes float {

        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s;

      .start-button:hover::before {
        left: 100%;
      }

      .start-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(167, 139, 250, 0.5);
      }

      .start-button:active {
        transform: translateY(-1px);

      @keyframes fadeInUp {

      @keyframes pulseGlow {

  <body>
    <div class="background"></div>
    
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>
    
    <div class="container">
      <div class="content">
        <div class="badge">
          <div class="badge-dot"></div>
          <span>100% Free & Anonymous</span>
        </div>
        
        <h1 class="title">Talk to Strangers</h1>
        <p class="subtitle">Connect instantly with people worldwide. Enjoy crystal-clear video, safe and anonymous conversations.</p>

        <div class="features">
          <div class="feature-item">
            <span class="feature-icon">🔒</span>
            <span>Private & Secure</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">⚡</span>
            <span>Instant Connect</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">🌍</span>
            <span>Global Network</span>
          </div>
        </div>

        <div class="stats">
          <div class="stats-dot"></div>
          <p class="stats-text">
            <span id="online-count">Loading...</span> active users
          </p>
        </div>
        
        <div class="cta-group">
          <a class="start-button" href="/video.html">Start Video Chat</a>
        </div>
      </div>
      
      <div class="preview">
        <div class="camera-status">
          <div class="camera-status-dot"></div>
          <span>Camera Active</span>
        </div>
        <video id="my-video" autoplay muted playsinline></video>
        <button id="toggle-camera" title="Toggle Camera">📷</button>
      </div>
    </div>
    
    <footer>
      <a href="mailto:srinivaspenumarthi2244@gmail.com">Contact via Email</a> | 
      <a href="https://www.linkedin.com/in/srinivaspenumarthi" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    </footer>

    <script>
      // Create floating particles
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        particlesContainer.appendChild(particle);
      }

      const socket = io('https://chatbackend-wdog.onrender.com');

      socket.on('connect', () => {
        console.log('Connected to server');
      });

      socket.on('online', (count) => {
        document.getElementById('online-count').innerText = count;
      });

      let videoStream;
      const videoElement = document.getElementById('my-video');
      const toggleBtn = document.getElementById('toggle-camera');
      const cameraStatus = document.querySelector('.camera-status span');

      navigator.mediaDevices.getUserMedia({ video: true, audio: false })
        .then((stream) => {
          videoStream = stream;
          videoElement.srcObject = stream;
        })
        .catch((err) => {
          console.error("Failed to access camera:", err);
          cameraStatus.textContent = 'Camera Unavailable';
          cameraStatus.previousElementSibling.style.background = '#ef4444';
        });

      toggleBtn.addEventListener('click', () => {
        if (videoStream) {
          const videoTrack = videoStream.getVideoTracks()[0];
          videoTrack.enabled = !videoTrack.enabled;
          toggleBtn.textContent = videoTrack.enabled ? '📷' : '🚫';
          cameraStatus.textContent = videoTrack.enabled ? 'Camera Active' : 'Camera Off';
          cameraStatus.previousElementSibling.style.background = videoTrack.enabled ? '#22c55e' : '#ef4444';
        }
      });
    </script>
